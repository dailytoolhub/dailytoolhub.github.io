<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse GST Calculator India - Calculate GST Instantly (2026)</title>
    <meta name="description" content="Use our free online GST Calculator for India. Instantly calculate Add GST, Remove GST, CGST, SGST, and IGST for 3%, 5%, 12%, 18%, and 28% slabs.">
    <meta name="keywords" content="gst calculator, gst calculator india, online gst calculator, reverse gst calculator, remove gst calculator">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1E3A8A',
                        secondary: '#10B981',
                        darkbg: '#0F172A',
                        darkcard: '#1E293B'
                    }
                }
            }
        }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "GST Calculator India",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "INR" },
      "description": "Free tool to calculate inclusive and exclusive GST, CGST, SGST, and IGST in India."
    }
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        .dark ::-webkit-scrollbar-track { background: #1E293B; }
        ::-webkit-scrollbar-thumb { background: #1E3A8A; border-radius: 4px; }
        .hide-arrows::-webkit-outer-spin-button, .hide-arrows::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .hide-arrows { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkbg dark:text-gray-100 transition-colors duration-200 font-sans">

    <nav class="bg-white dark:bg-darkcard shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <i data-lucide="calculator" class="text-primary dark:text-secondary h-8 w-8"></i>
                    <span class="font-bold text-xl tracking-tight">GST Calc <span class="text-secondary">Hub</span></span>
                </div>
                <div class="hidden md:flex space-x-8 font-medium">
                    <a href="index.html" class="text-primary dark:text-secondary">Home</a>
                    <a href="#faq" class="hover:text-primary dark:hover:text-secondary transition">FAQs</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-5xl font-extrabold text-primary dark:text-white mb-4">Reverse GST Calculator</h1>
            <p class="text-lg text-gray-600 dark:text-gray-400">Extract base amount and GST from inclusive prices.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7 bg-white dark:bg-darkcard rounded-2xl shadow-lg p-6 md:p-8 border border-gray-100 dark:border-gray-800">
                <div class="flex p-1 bg-gray-100 dark:bg-gray-800 rounded-lg mb-6">
                    <button id="modeAdd" class="flex-1 py-2 px-4 rounded-md text-gray-500 dark:text-gray-400 hover:text-gray-900 font-semibold text-sm md:text-base transition-all" onclick="setMode('add')">Add GST (+)</button>
                    <button id="modeRemove" class="flex-1 py-2 px-4 rounded-md bg-white dark:bg-darkcard shadow text-primary dark:text-white font-bold text-sm md:text-base transition-all" onclick="setMode('remove')">Remove GST (-)</button>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Amount (₹)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-gray-500 font-bold text-lg">₹</span>
                        </div>
                        <input type="number" id="amount" class="hide-arrows w-full pl-10 pr-4 py-4 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-2xl font-bold text-gray-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="0" oninput="calculateGST()">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">GST Rate (%)</label>
                    <div class="grid grid-cols-5 gap-2">
                        <button class="slab-btn bg-gray-100 dark:bg-gray-800 opacity-40 cursor-not-allowed font-semibold py-3 rounded-lg border-2 border-transparent transition-all" disabled>3%</button>
                        <button class="slab-btn bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 font-semibold py-3 rounded-lg border-2 border-transparent transition-all" onclick="setRate(5, this)">5%</button>
                        <button class="slab-btn bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 font-semibold py-3 rounded-lg border-2 border-transparent transition-all" onclick="setRate(12, this)">12%</button>
                        <button class="slab-btn bg-primary text-white border-primary font-semibold py-3 rounded-lg border-2 transition-all shadow-md" onclick="setRate(18, this)">18%</button>
                        <button class="slab-btn bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 font-semibold py-3 rounded-lg border-2 border-transparent transition-all" onclick="setRate(28, this)">28%</button>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Sale Type</label>
                    <div class="flex gap-4">
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="stateType" value="intra" class="w-4 h-4 text-primary focus:ring-primary" checked onchange="calculateGST()">
                            <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Intra-State (CGST + SGST)</span>
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="stateType" value="inter" class="w-4 h-4 text-primary focus:ring-primary" onchange="calculateGST()">
                            <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Inter-State (IGST)</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div id="invoicePanel" class="bg-gradient-to-br from-primary to-blue-900 dark:from-darkcard dark:to-gray-900 rounded-2xl shadow-xl p-8 text-white sticky top-24 border border-blue-800 dark:border-gray-700">
                    <h3 class="text-blue-200 text-sm font-semibold uppercase tracking-wider mb-2">Calculation Summary</h3>
                    
                    <div class="mb-6">
                        <p class="text-blue-100 text-sm mb-1">Total Amount</p>
                        <div class="text-4xl md:text-5xl font-black tracking-tight">₹<span id="resTotal">0.00</span></div>
                    </div>

                    <div class="space-y-4 border-t border-blue-700/50 pt-6">
                        <div class="flex justify-between items-center">
                            <span class="text-blue-200">Base Amount</span>
                            <span class="font-bold text-lg">₹<span id="resBase">0.00</span></span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-blue-200">GST (<span id="resRateTxt">18</span>%)</span>
                            <span class="font-bold text-lg text-secondary">₹<span id="resTax">0.00</span></span>
                        </div>
                        
                        <div class="bg-blue-950/40 dark:bg-gray-800/50 rounded-lg p-4 mt-2 border border-blue-800/30">
                            <div id="breakdownIntra" class="space-y-2">
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-gray-300">CGST (9%)</span>
                                    <span class="font-semibold text-gray-100">₹<span id="resCgst">0.00</span></span>
                                </div>
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-gray-300">SGST (9%)</span>
                                    <span class="font-semibold text-gray-100">₹<span id="resSgst">0.00</span></span>
                                </div>
                            </div>
                            <div id="breakdownInter" class="hidden space-y-2">
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-gray-300">IGST (18%)</span>
                                    <span class="font-semibold text-gray-100">₹<span id="resIgst">0.00</span></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-3 mt-8">
                        <button onclick="copyToClipboard()" class="flex flex-col items-center justify-center gap-1 bg-white/10 hover:bg-white/20 py-3 rounded-xl transition">
                            <i data-lucide="copy" class="h-5 w-5"></i>
                            <span class="text-xs font-semibold">Copy</span>
                        </button>
                        <button onclick="generatePDF()" class="flex flex-col items-center justify-center gap-1 bg-white/10 hover:bg-white/20 py-3 rounded-xl transition">
                            <i data-lucide="download" class="h-5 w-5"></i>
                            <span class="text-xs font-semibold">PDF</span>
                        </button>
                        <button onclick="window.print()" class="flex flex-col items-center justify-center gap-1 bg-white/10 hover:bg-white/20 py-3 rounded-xl transition">
                            <i data-lucide="printer" class="h-5 w-5"></i>
                            <span class="text-xs font-semibold">Print</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white dark:bg-darkcard border-t border-gray-200 dark:border-gray-800 pt-12 pb-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
            &copy; 2026 Daily Tool Hub. All rights reserved.
        </div>
    </footer>

    <script>
        lucide.createIcons();
        let mode = 'remove';
        let currentRate = 18;

        const formatINR = (num) => new Intl.NumberFormat('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('modeAdd').className = mode === 'add' ? "flex-1 py-2 px-4 rounded-md bg-white dark:bg-darkcard shadow text-primary dark:text-white font-bold text-sm md:text-base transition-all" : "flex-1 py-2 px-4 rounded-md text-gray-500 dark:text-gray-400 hover:text-gray-900 font-semibold text-sm md:text-base transition-all";
            document.getElementById('modeRemove').className = mode === 'remove' ? "flex-1 py-2 px-4 rounded-md bg-white dark:bg-darkcard shadow text-primary dark:text-white font-bold text-sm md:text-base transition-all" : "flex-1 py-2 px-4 rounded-md text-gray-500 dark:text-gray-400 hover:text-gray-900 font-semibold text-sm md:text-base transition-all";
            calculateGST();
        }

        function setRate(rate, element) {
            currentRate = rate;
            document.querySelectorAll('.slab-btn').forEach(btn => btn.className = "slab-btn bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 font-semibold py-3 rounded-lg border-2 border-transparent transition-all");
            element.className = "slab-btn bg-primary text-white border-primary font-semibold py-3 rounded-lg border-2 transition-all shadow-md";
            calculateGST();
        }

        function calculateGST() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const stateType = document.querySelector('input[name="stateType"]:checked').value;
            
            let baseAmount, gstAmount, totalAmount;
            
            if (mode === 'add') {
                baseAmount = amount;
                gstAmount = amount * (currentRate / 100);
                totalAmount = amount + gstAmount;
            } else {
                totalAmount = amount;
                baseAmount = amount / (1 + (currentRate / 100));
                gstAmount = amount - baseAmount;
            }

            document.getElementById('resTotal').innerText = formatINR(totalAmount);
            document.getElementById('resBase').innerText = formatINR(baseAmount);
            document.getElementById('resTax').innerText = formatINR(gstAmount);
            document.getElementById('resRateTxt').innerText = currentRate;

            if (stateType === 'intra') {
                document.getElementById('breakdownIntra').classList.remove('hidden');
                document.getElementById('breakdownInter').classList.add('hidden');
                const halfRate = currentRate / 2;
                const halfGst = gstAmount / 2;
                document.getElementById('resCgst').innerText = formatINR(halfGst);
                document.getElementById('resSgst').innerText = formatINR(halfGst);
            } else {
                document.getElementById('breakdownIntra').classList.add('hidden');
                document.getElementById('breakdownInter').classList.remove('hidden');
                document.getElementById('resIgst').innerText = formatINR(gstAmount);
            }
        }

        function copyToClipboard() {
            const text = `GST: Base ₹${document.getElementById('resBase').innerText}, Tax ₹${document.getElementById('resTax').innerText}, Total ₹${document.getElementById('resTotal').innerText}`;
            navigator.clipboard.writeText(text).then(() => alert('Copied!'));
        }

        function generatePDF() {
            html2pdf().set({ margin: 0.5, filename: 'GST_Calculation.pdf', jsPDF: { unit: 'in', format: 'letter' } }).from(document.getElementById('invoicePanel')).save();
        }
    </script>
</body>
</html>
